name: Continuous Telegram Bot Run

on:
  push:
    branches: [ "main" ]
  # این گزینه بهت اجازه میده هر زمان ربات خاموش شد، از تب Actions با یک کلیک دوباره روشنش کنی
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    # تنظیم زمان روی ۳۵۰ دقیقه (کمی کمتر از سقف ۶ ساعت گیت‌هاب برای جلوگیری از خطای ناگهانی)
    timeout-minutes: 350 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install aiogram

    - name: Run Telegram Bot
      env:
        # خواندن توکن از سکرت‌های گیت‌هاب که در مرحله قبل ساختی
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
        # توجه: فرض کردم اسم فایل پایتون شما main.py یا bot.py هست. 
        # اگر اسم فایلت چیز دیگه‌ای هست، خط زیر رو اصلاح کن.
        python main.py
